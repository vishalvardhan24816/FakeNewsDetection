<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="DebunkHub - a 5-step rule-based fake news detector.">
    <title>{% block title %}{{ brand }}{% endblock %}</title>

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.3.3/css/bootstrap.min.css">
    <link rel="stylesheet"
          href="https://use.fontawesome.com/releases/v5.15.4/css/all.css">
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">

    {% block head_extra %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-md navbar-dark fixed-top">
        <div class="container">
            <a class="navbar-brand" href="{{ url_for('index') }}">
                <i class="fas fa-shield-alt"></i>{{ brand }}
            </a>
            <button class="navbar-toggler" type="button"
                    data-bs-toggle="collapse" data-bs-target="#navMain"
                    aria-controls="navMain" aria-expanded="false"
                    aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navMain">
                <ul class="navbar-nav ms-auto align-items-md-center">
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('index') }}">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('about') }}">How it works</a>
                    </li>
                    <li class="nav-item ms-md-2">
                        <a class="nav-link btn btn-primary px-3 py-2" href="{{ url_for('detect') }}">
                            <i class="fas fa-search me-1"></i>Try it
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container page-main">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="container d-flex flex-wrap justify-content-between align-items-center">
            <div>
                <strong>{{ brand }}</strong> &middot;
                <span class="text-muted">5-step rule-based fake-news validator</span>
            </div>
            <div class="text-muted small">
                Built with Python, Flask &amp; Hugging Face
            </div>
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
    {% block body_extra %}{% endblock %}
</body>
</html>
