{% extends "base.html" %}

{% block title %}Error {{ code }} &middot; {{ brand }}{% endblock %}

{% block content %}
<div class="text-center py-5">
    <div class="display-1 text-muted">{{ code }}</div>
    <h1 class="mt-3">{{ message }}</h1>

        <i class="fas fa-home me-2"></i>Back to home
    </a>
</div>
{% endblock %}
